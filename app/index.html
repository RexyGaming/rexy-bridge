function renderGpDebug(pads){
  if(!gpDebugOn) return;
  const wrap=document.getElementById('gp-debug'); if(!wrap) return;
  const connected = pads.filter(gp=>gp);
  if(!connected.length){
    wrap.innerHTML='<div class="none">No gamepads detected. Press any key or click somewhere first — browsers need a user gesture before the Gamepad API lights up. Then plug in / spin a wheel.</div>';
    return;
  }
  wrap.innerHTML = connected.map(gp=>{
    const axesHtml = Array.from(gp.axes).map((v,i)=>{
      const broken = !isFinite(v) || Math.abs(v) > 1.0;
      if(broken){
        return `<div class="ax broken">
          <span class="ai">ax ${i}</span>
          <div class="abar"><span class="ac"></span></div>
          <span class="av" title="Out of spec range [-1,+1] — ignored by Bind and runtime">${v.toExponential(2)} ⚠</span>
        </div>`;
      }
      const off = axisOffset(gp.index, i);
      const corrected = v - off;                             // post-calibration value used by app
      const pct=((corrected+1)/2)*100;
      const offLabel = off ? ` (cal -${off.toFixed(3)})` : '';
      return `<div class="ax">
        <span class="ai">ax ${i}</span>
        <div class="abar"><span class="ac"></span><span class="af" style="${corrected>=0?'left:50%;width:'+(pct-50)+'%':'right:50%;left:auto;width:'+(50-pct)+'%'}"></span></div>
        <span class="av" title="raw ${v.toFixed(3)}${offLabel}">${corrected.toFixed(3)}</span>
      </div>`;
    }).join('');
    const btnsHtml = Array.from(gp.buttons).map((b,i)=>
      `<span class="bt${b.pressed?' on':''}">${i}${b.pressed?' ●':''}</span>`).join('');
    return `<div class="gpcard">
      <h4>Pad ${gp.index} — ${gp.id}</h4>
      <div class="meta">${gp.axes.length} axes · ${gp.buttons.length} buttons · mapping: ${gp.mapping||'(none)'}</div>
      <div class="axes">${axesHtml}</div>
      <div class="btns">${btnsHtml}</div>
    </div>`;
  }).join('');
}

function inputLoop(){
  const pads=navigator.getGamepads?Array.from(navigator.getGamepads()):[];
  // Tick autolevel animation (runs regardless of capture state)
  tickAutolevel();
  if(functionLearn){
    for(const gp of pads){ if(!gp) continue; const pv=gpPrev[gp.index];
      gp.buttons.forEach((b,i)=>{ const p0=pv?pv.buttons[i]:false;
        if(b.pressed&&!p0) captureFunctionInput({kind:'button',pad:gp.index,button:i});
      });
    }
  } else if(camLearn){
    for(const gp of pads){ if(!gp) continue; const pv=gpPrev[gp.index];
      gp.buttons.forEach((b,i)=>{ const p0=pv?pv.buttons[i]:false;
        if(b.pressed&&!p0){ camBindings[camLearn.path]={kind:'button',pad:gp.index,button:i}; saveCamBindings(); logMsg('Camera bound to Pad'+gp.index+'·B'+i); camLearn=null; renderCamButtons(); }
      });
    }
  } else if(learn){
    // Capture an actuated axis. Triggers on EITHER a sudden change (real stick swing)
    // OR a sustained non-zero value (Rexy Wheel spinning at steady rate — its axis
    // sits at e.g. +0.4 while you turn it, so frame-to-frame delta ≈ 0).
    // SKIP axes outside the gamepad spec range [-1, +1] — the current Rexy firmware
    // is dumping junk like 1.2e9 on axis 9, which would otherwise hijack every Bind.
    // (Self-heals once the firmware is patched — Rob's snagging list.)
    for(const gp of pads){ if(!gp) continue; const pv=gpPrev[gp.index];
      gp.axes.forEach((v,i)=>{
        if(!isFinite(v) || Math.abs(v) > 1.0) return;            // broken axis — ignore
        // Drift-corrected values for capture decision (prevents a sticky stick from
        // being grabbed when user is actually trying to move a different axis).
        const off = axisOffset(gp.index, i);
        const corrected = v - off;
        const p0 = pv ? (pv.axes[i] - off) : 0;
        const delta = Math.abs(corrected - p0);
        const absVal = Math.abs(corrected);
        if(delta > 0.10 || absVal > 0.10){
          // Pass the sign of the deflection so captureInput can set the binding's
          // inv flag — user's first-pressed direction becomes slider-positive.
          captureInput({kind:'axis', pad:gp.index, axis:i, sign: corrected >= 0 ? 1 : -1});
        }
      });
      gp.buttons.forEach((b,i)=>{ const p0=pv?pv.buttons[i]:false; if(b.pressed&&!p0) captureInput({kind:'button',pad:gp.index,button:i}); });
    }
  } else {
    // bound-button camera triggers (edge-detect)
    for(const [path,b] of Object.entries(camBindings)){
      if(!b || b.kind!=='button') continue;
      const gp=pads[b.pad]; if(!gp) continue;
      const pv=gpPrev[gp.index]; const was = pv ? !!pv.buttons[b.button] : false;
      const now = !!(gp.buttons[b.button] && gp.buttons[b.button].pressed);
      if(now && !was) setCamera(path);
    }
    // bound-button function triggers (edge-detect) — e.g. Autolevel
    for(const [action,b] of Object.entries(functionBindings)){
      if(!b || b.kind!=='button') continue;
      const gp=pads[b.pad]; if(!gp) continue;
      const pv=gpPrev[gp.index]; const was = pv ? !!pv.buttons[b.button] : false;
      const now = !!(gp.buttons[b.button] && gp.buttons[b.button].pressed);
      if(now && !was) fireFunctionAction(action);
    }
    const STEP=0.014;
    // Axis idle floor. Filters the Rexy Wheels firmware drift (~0.008 sustained
    // on the inactive wheel) without losing real slow motion (slowest comfortable
    // wheel turn yields ~0.016). Remove / lower once the wheel firmware is fixed.
    const STICK_DZ=0.012;
    // Per-frame baseline accumulation rate for absolute-mode wheels. A full-deflection
    // wheel (raw=±1) at sensitivity 1.0 traverses 0→1 slider in ~1.5s at 60fps.
    // Per-param sensitivity multiplies it.
    const ABS_ACC=0.012;
    // Gamma response curve on axis input for absolute-mode params. Read per-param
    // from each card's C field below (default 1.5). 1.0=linear; higher=fluid-head feel
    // (slow wheel → very slow camera, fast wheel → fast camera). Velocity-mode params
    // already have a quadratic curve baked into the bridge's _velocity_delta.
    for(const p of PARAMS){ const b=bindings[p]; if(!b) continue;
      if(heldParams.has(p)) continue;                  // Hold engaged — bindings ignored for this param
      if(autolevelState && autolevelState.targetParam===p) continue;  // autolevel is driving this param — don't fight it
      const fEl=document.getElementById('feat-'+p);
      const feather = fEl ? Math.max(0, Math.min(0.99, parseFloat(fEl.value)||0)) : 0;
      const retain  = feather * 0.95;                 // 0 = instant; ~0.94 at feather=1 = very soft ramp
      if(b.type==='axis'){ const gp=pads[b.pad]; if(gp){
        let raw=gp.axes[b.axis];
        if(!isFinite(raw) || Math.abs(raw)>1.0) continue;        // broken axis — leave slider alone
        raw -= axisOffset(b.pad, b.axis);                        // null drift offset
        if(b.inv) raw = -raw;                                    // user's first-press direction → slider-positive
        if(Math.abs(raw)<STICK_DZ) raw=0;
        // Per-param deadband on RAW input. Crucial for absolute mode: small axis
        // values would otherwise accumulate into slider drift over time. PS4 sticks
        // have a residual offset after they're moved (returns to ~0.05 not 0), so
        // the per-param D filters that. Velocity-mode params get this too — it's
        // harmless there because bridge-side _velocity_delta also checks deadband.
        const dEl_p = document.getElementById('dead-'+p);
        const dead_p = dEl_p ? Math.max(0, parseFloat(dEl_p.value)||0) : 0;
        if(Math.abs(raw) < dead_p) raw = 0;
        // Two distinct semantics:
        //  • VELOCITY mode (continuous wheels, drone grip, base XYZ): slider POSITION
        //    = axis value, mapped directly. Wheel at rest → slider at centre → camera stops.
        //    Feather smooths the SLIDER POSITION (eases into and out of motion).
        //  • ABSOLUTE mode (pan/tilt/roll absolute, grip in crane/dolly): slider
        //    ACCUMULATES from axis as a rate. Wheel stops (raw=0) = no change = camera holds.
        //    Feather smooths the RATE (rate ramps up when wheel starts, decays when it stops).
        const paramIsVelocity = isVelocityAxis(p) ||
          (['pan','tilt','roll'].includes(p) && currentWheelMode==='continuous');
        if(paramIsVelocity){
          const target=(raw+1)/2;
          if(feather>0){
            const cur = (paramSmooth[p]==null) ? getParam(p) : paramSmooth[p];
            paramSmooth[p] = cur*retain + target*(1-retain);
            if(Math.abs(paramSmooth[p]-getParam(p))>0.0015) setParam(p, paramSmooth[p]);
          } else {
            if(Math.abs(target-getParam(p))>0.0015) setParam(p, target);
          }
        } else {
          const sEl=document.getElementById('sens-'+p);
          const cEl=document.getElementById('curve-'+p);
          const sens  = sEl ? (parseFloat(sEl.value)||1.0) : 1.0;
          const curve = cEl ? Math.max(0.5, Math.min(3, parseFloat(cEl.value)||1.5)) : 1.5;
          // Gamma curve on raw axis: |raw|^C preserving sign. Gives the game-like
          // fluid head feel — small turns produce much-smaller camera motion than
          // the linear ratio, big turns still produce fast motion.
          const shaped = (raw === 0) ? 0 : Math.sign(raw) * Math.pow(Math.abs(raw), curve);
          const targetRate = shaped * ABS_ACC * sens;
          paramRate[p] = (paramRate[p]||0)*retain + targetRate*(1-retain);
          // Apply the rate every frame — no accumulator. With the gamma curve, slow
          // wheels produce very small but consistent rates which look smoothest when
          // applied at full 60Hz. The 1e-6 floor skips pure rest and feather-decay tail.
          if(Math.abs(paramRate[p]) > 1e-6){
            const next = Math.max(0, Math.min(1, getParam(p) + paramRate[p]));
            setParam(p, next);
          }
        }
      } }
      else {
        // Key / button input — STEP per frame becomes the target rate.
        // Feather smooths the rate so a key press eases in rather than snapping.
        let targetRate = 0;
        if(pressedInput(b.inc,pads)) targetRate += STEP;
        if(pressedInput(b.dec,pads)) targetRate -= STEP;
        paramRate[p] = (paramRate[p]||0)*retain + targetRate*(1-retain);
        if(Math.abs(paramRate[p]) > 1e-6){
          const next = Math.max(0, Math.min(1, getParam(p) + paramRate[p]));
          setParam(p, next);
        }
      }
    }
  }
  renderGpDebug(pads);           // diagnostic — only renders when panel is shown
  gpPrev={}; for(const gp of pads){ if(gp) gpPrev[gp.index]={axes:Array.from(gp.axes),buttons:gp.buttons.map(b=>b.pressed)}; }
  requestAnimationFrame(inputLoop);
}
function pressedInput(inp,pads){
  if(inp.kind==='key') return keysDown.has(inp.code);
  if(inp.kind==='button'){ const gp=pads[inp.pad]; return !!(gp&&gp.buttons[inp.button]&&gp.buttons[inp.button].pressed); }
  return false;
}
requestAnimationFrame(inputLoop);

// ── Config: save / export / import the whole setup (bindings + connection + gear) ──
function gv(id){ const e=document.getElementById(id); return e?e.value:undefined; }
function sv(id,v){ const e=document.getElementById(id); if(e&&v!=null) e.value=v; }
function gatherConfig(){
  const paramTunings={};
  for(const p of PARAMS){
    const s=document.getElementById('sens-'+p), d=document.getElementById('dead-'+p),
          f=document.getElementById('feat-'+p), c=document.getElementById('curve-'+p);
    if(s||d||f||c){
      const sp=parseFloat(s&&s.value), dp=parseFloat(d&&d.value),
            fp=parseFloat(f&&f.value), cp=parseFloat(c&&c.value);
      paramTunings[p]={
        sensitivity: isNaN(sp) ? 1.0 : sp,
        curve:       isNaN(cp) ? 1.5 : cp,
        deadband:    isNaN(dp) ? 0.0 : dp,          // 0 is valid (not "falsy → default")
        feather:     isNaN(fp) ? 0.0 : fp
      };
    }
  }
  const paramRanges={};
  for(const id in PARAM_RANGES){
    paramRanges[id] = { out_min: PARAM_RANGES[id].out_min, out_max: PARAM_RANGES[id].out_max };
  }
  return {
    rexyBridgeConfig: 1,
    saved: new Date().toISOString(),
    connection: { wsHost:gv('cfg-ws-host'), wsPort:gv('cfg-ws-port'),
                  ueHost:gv('cfg-ue5-host'), uePort:gv('cfg-ue5-port'), base:gv('cfg-base') },
    lens: selL.value, filmback: selF.value,
    tuning: { sensitivity: parseFloat(gv('tune-sens'))||1.0,
              deadband:    parseFloat(gv('tune-dead'))||0.08 },
    bindings: allBindings,                          // per-camera map: {cameraPath: {param: binding}}
    camBindings: camBindings,
    paramTunings: paramTunings,
    paramRanges: paramRanges,                       // per-param Min/Max overrides (out_min/out_max in native units)
    customLenses: customLenses,                     // user-defined lens specs
    units: unitSystem,                              // 'metric' | 'imperial'
    focusUnits: focusUnits,                         // independent focus unit pref
    functionBindings: functionBindings,             // bindable actions: autolevel etc
    autolevel: {
      speed:   parseFloat((document.getElementById('auto-speed')||{}).value)   || 1.5,
      feather: parseFloat((document.getElementById('auto-feather')||{}).value) || 0.5
    },
    wheelMode: currentWheelMode,                    // 'absolute' | 'continuous'
    gripMode:  currentGripMode                      // 'crane' | 'dolly' | 'drone'
  };
}
async function exportConfig(){
  const data=JSON.stringify(gatherConfig(),null,2);
  if(window.showSaveFilePicker){                       // native "Save As" — choose name + folder
    try{
      const h=await window.showSaveFilePicker({
        suggestedName:'rexy-bridge-config.json',
        types:[{description:'Rexy Bridge config',accept:{'application/json':['.json']}}]
      });
      const w=await h.createWritable(); await w.write(data); await w.close();
      logMsg('Config saved: '+h.name); return;
    }catch(e){ if(e&&e.name==='AbortError') return; }   // user cancelled
  }
  const blob=new Blob([data],{type:'application/json'});  // fallback: download to Downloads
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='rexy-bridge-config.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  logMsg('Config exported (Downloads)');
}
function importConfig(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ applyConfig(JSON.parse(r.result)); logMsg('Config imported: '+file.name); }
                 catch(e){ logMsg('Import failed — not valid config JSON'); } };
  r.readAsText(file);
}
function applyConfig(cfg){
  if(!cfg||!cfg.rexyBridgeConfig){ logMsg('Import failed — not a Rexy Bridge config'); return; }
  if(cfg.connection){ const c=cfg.connection;
    sv('cfg-ws-host',c.wsHost); sv('cfg-ws-port',c.wsPort);
    sv('cfg-ue5-host',c.ueHost); sv('cfg-ue5-port',c.uePort); sv('cfg-base',c.base); }
  if(cfg.lens){ selL.value=cfg.lens; }
  if(cfg.filmback){ selF.value=cfg.filmback; }
  if(cfg.bindings){
    // Two shapes — legacy (flat: {param: binding}) and current (per-camera: {camPath: {param: binding}}).
    const isFlat = Object.values(cfg.bindings).some(v => v && (v.type==='axis' || v.type==='keys'));
    allBindings = isFlat ? { __default__: cfg.bindings } : cfg.bindings;
    localStorage.setItem('rexy_bindings_v2', JSON.stringify(allBindings));
    bindings = loadBindingsForActiveCamera();
    PARAMS.forEach(bindLabel);
  }
  if(cfg.camBindings){ camBindings=cfg.camBindings; localStorage.setItem('rexy_cam_bindings',JSON.stringify(camBindings)); renderCamButtons(); }
  if(cfg.tuning){ sv('tune-sens', cfg.tuning.sensitivity); sv('tune-dead', cfg.tuning.deadband); }
  if(cfg.paramTunings){
    for(const [p,t] of Object.entries(cfg.paramTunings)){
      sv('sens-'+p, t.sensitivity); sv('dead-'+p, t.deadband);
      if(t.feather!=null) sv('feat-'+p, t.feather);
      if(t.curve!=null)   sv('curve-'+p, t.curve);
    }
  }
  if(cfg.paramRanges){
    for(const [p,r] of Object.entries(cfg.paramRanges)){
      if(PARAM_RANGES[p]){
        if(typeof r.out_min === 'number') PARAM_RANGES[p].out_min = r.out_min;
        if(typeof r.out_max === 'number') PARAM_RANGES[p].out_max = r.out_max;
      }
    }
    persistParamRanges();
    refreshRangeInputs();
    PARAMS.forEach(p=>updateBar(p, getParam(p)));
  }
  if(Array.isArray(cfg.customLenses)){
    customLenses = cfg.customLenses;
    localStorage.setItem('rexy_custom_lenses', JSON.stringify(customLenses));
    rebuildLensDropdown();
    if(cfg.lens) selL.value = cfg.lens;            // re-pick after rebuild (in case it was a custom)
  }
  if(cfg.units){ setUnits(cfg.units); }
  if(cfg.focusUnits){ setFocusUnits(cfg.focusUnits); }
  if(cfg.functionBindings){
    functionBindings = cfg.functionBindings;
    localStorage.setItem('rexy_function_bindings', JSON.stringify(functionBindings));
    Object.keys(FUNCTION_ACTIONS).forEach(renderFunctionBindButton);
  }
  if(cfg.autolevel){
    sv('auto-speed',   cfg.autolevel.speed);
    sv('auto-feather', cfg.autolevel.feather);
    persistAutolevelTuning();
  }
  if(cfg.wheelMode){ setWheelMode(cfg.wheelMode); }
  if(cfg.gripMode){  setGripMode(cfg.gripMode);  }
  if(socket){ socket.onclose=null; socket.close(); }
  connect();
  setTimeout(()=>{
    pushOSCSettings(); sendTuning(); pushAllParamTunings(); pushAllParamRanges();
    sendPreset('filmback_preset',selF.value);
    applyLensSelection(selL.value);                 // routes through custom_lens (writes LensSettings)
  }, 800);
}

// ── focus cm → ft/in (display helper for later live wiring) ──────────────────
function cmToFtIn(cm){
  const inches=cm/2.54, ft=Math.floor(inches/12), inch=Math.round(inches-ft*12);
  return ft + "' " + inch + '"';
}

// ── Controls ─────────────────────────────────────────────────────────────────
// heldParams: when a param is in this set, the input loop ignores its binding
// (bound wheel / key / button can't move the slider). Slider stays manually
// draggable — Hold is about decoupling the binding, not freezing the value.
// Useful for parking one axis (e.g. pan) while operating others.
const heldParams = new Set();
function toggleHold(id){
  if(heldParams.has(id)) heldParams.delete(id); else heldParams.add(id);
  const btn=document.getElementById('hold-'+id);
  if(btn) btn.classList.toggle('active', heldParams.has(id));
  // Also clear any in-flight feather/accumulator state so re-enabling starts clean
  paramRate[id] = 0; paramSmooth[id] = getParam(id);
  logMsg('Hold '+id+': '+(heldParams.has(id)?'ON':'OFF'));
}
function doReset(id){
  // Per-axis reset.
  //  • Velocity axis (base XYZ; or grip in DRONE mode): send slider value 0.5
  //    — the bridge's osc_send intercept sets its _drone_state / _base_state
  //    for that axis to 0.5, halting the velocity tick for that axis.
  //  • Absolute axis (pan/tilt/roll/zoom/aperture/focus; grip in crane/dolly):
  //    CLEAR the calibrated offset on the bridge first, THEN send slider=0.5.
  //    Bridge writes (0.5-0.5)*sens*range + 0 = 0 to UE, so the camera lands
  //    on absolute 0. Slider centred, LIVE matches Commanded. Replaces the
  //    old "calibrate" call which silently snapped the camera back to the
  //    stale offset before reading.
  paramRate[id]   = 0;
  paramSmooth[id] = 0.5;
  if(isVelocityAxis(id)){
    setParam(id, 0.5);                                          // halts velocity
    logMsg('Halt '+id);
  } else {
    if(socket&&socket.readyState===WebSocket.OPEN)
      socket.send(JSON.stringify({type:'clear_offset', path:'/rexy/'+id}));
    setParam(id, 0.5);                                          // writes absolute 0 to UE
    logMsg('Reset '+id+' to 0');
  }
}
// ── Custom lenses (user-defined, separate from UE's built-in presets) ───────
let customLenses=[]; try{ customLenses=JSON.parse(localStorage.getItem('rexy_custom_lenses')||'[]'); }catch(e){}
function toggleCustomLens(){
  const el=document.getElementById('custom-lens-form');
  if(!el) return;
  el.style.display = (el.style.display==='none') ? 'flex' : 'none';
}
function saveCustomLens(){
  const name = document.getElementById('cl-name').value.trim();
  if(!name){ logMsg('Custom lens needs a name'); return; }
  const lens = {
    name,
    custom: true,
    min_focal:    parseFloat(document.getElementById('cl-fmin').value)  || 50,
    max_focal:    parseFloat(document.getElementById('cl-fmax').value)  || 50,
    min_aperture: parseFloat(document.getElementById('cl-amin').value)  || 1.8,
    max_aperture: parseFloat(document.getElementById('cl-amax').value)  || 22,
    min_focus:    parseFloat(document.getElementById('cl-focus').value) || 50,
  };
  // Replace if a custom lens with the same name already exists, else append.
  customLenses = customLenses.filter(l=>l.name!==name);
  customLenses.push(lens);
  localStorage.setItem('rexy_custom_lenses', JSON.stringify(customLenses));
  rebuildLensDropdown();
  selL.value = name;
  selL.onchange();                                         // apply immediately
  toggleCustomLens();
  logMsg('Custom lens saved: '+name);
}
function rebuildLensDropdown(){
  if(!selL) return;
  const current = selL.value;
  selL.innerHTML='';
  // Built-in presets first (UE knows about these)
  LENSES.forEach(n=>{ const o=new Option(n,n); selL.add(o); });
  // Then custom lenses, tagged
  if(customLenses.length){
    const sep=new Option('— custom —','',true,false); sep.disabled=true; selL.add(sep);
    customLenses.forEach(l=>selL.add(new Option(l.name, l.name)));
  }
  // Try to restore previous selection
  if([...selL.options].some(o=>o.value===current)) selL.value=current;
}
function applyLensSelection(name){
  // Look up specs: prefer user customs (they can override a built-in name); fall back to built-ins.
  const cl = customLenses.find(l=>l.name===name) || LENSES_DATA[name];
  if(!cl){ logMsg('Unknown lens: '+name); return; }
  const LENS_INFINITY_CM = 100000;       // 1km — effectively infinity for any cinema use
  const max_focus = cl.max_focus || LENS_INFINITY_CM;
  // Always go through apply_custom_lens on the bridge (writes LensSettings directly).
  // SetLensPresetByName doesn't recognise our names so it leaves the camera unchanged.
  if(socket&&socket.readyState===WebSocket.OPEN){
    socket.send(JSON.stringify({type:'custom_lens',
      name, min_focal:cl.min_focal, max_focal:cl.max_focal,
      min_aperture:cl.min_aperture, max_aperture:cl.max_aperture,
      min_focus:cl.min_focus, max_focus}));
  }
  // Mirror on GUI side: update PARAM_RANGES, refresh Min/Max inputs, re-render readouts.
  PARAM_RANGES.zoom.out_min     = cl.min_focal;     PARAM_RANGES.zoom.out_max     = cl.max_focal;
  PARAM_RANGES.aperture.out_min = cl.min_aperture;  PARAM_RANGES.aperture.out_max = cl.max_aperture;
  PARAM_RANGES.focus.out_min    = cl.min_focus;     PARAM_RANGES.focus.out_max    = max_focus;
  refreshRangeInputs();
  ['zoom','aperture','focus'].forEach(p=>updateBar(p, getParam(p)));
  // Lock zoom slider on primes (no focal length range)
  setZoomLocked(cl.min_focal === cl.max_focal);
  logMsg('Lens → '+name+' ('+cl.min_focal+(cl.min_focal===cl.max_focal?'mm prime':'-'+cl.max_focal+'mm zoom')+', f/'+cl.min_aperture+'-'+cl.max_aperture+')');
}

function setZoomLocked(locked){
  const s=document.getElementById('slider-zoom'); if(!s) return;
  s.disabled = locked;
  s.style.opacity = locked ? '0.35' : '';
  s.style.cursor  = locked ? 'not-allowed' : '';
  s.title         = locked ? 'Zoom locked — prime lens has fixed focal length' : '';
}

// ── Status ───────────────────────────────────────────────────────────────────
function setWS(on){ document.getElementById('ws-dot').className='dot '+(on?'on':'warn');
  document.getElementById('ws-status').textContent=on?'WS CONNECTED':'WS OFFLINE'; }
function setHID(on,label){ document.getElementById('hid-dot').className='dot '+(on?'live':'');
  document.getElementById('hid-status').textContent=label||(on?'HARDWARE LIVE':'HARDWARE OFFLINE'); }
function setRC(on){ document.getElementById('rc-dot').className='dot '+(on?'on':'');
  document.getElementById('rc-status').textContent=on?'UE RC CONNECTED':'UE RC'; }

// ── WebSocket (same protocol as the current app / rexy_osc.py) ───────────────
function connect(){
  clearTimeout(retryTimer);
  const host=document.getElementById('cfg-ws-host').value.trim()||'127.0.0.1';
  const port=document.getElementById('cfg-ws-port').value.trim()||'9000';
  try{
    socket=new WebSocket('ws://'+host+':'+port);
    socket.onopen=()=>{
      setWS(true); setHID(true,'SCRIPT RUNNING');
      pushOSCSettings(); sendTuning(); pushAllParamTunings(); pushAllParamRanges();
      // Push current GUI modes so the bridge matches what's on screen — otherwise
      // a Continuous-mode session won't actually engage the bridge tick if user
      // picked Continuous before WS came up, or after a bridge restart.
      socket.send(JSON.stringify({type:'wheel_mode', mode:currentWheelMode}));
      socket.send(JSON.stringify({type:'grip_mode',  mode:currentGripMode}));
      setTimeout(scanCameras,1500);
    };
    socket.onmessage=(e)=>{ try{ handleMessage(JSON.parse(e.data)); }catch(err){} };
    socket.onclose=()=>{ setWS(false); setHID(false); setRC(false); retryTimer=setTimeout(connect,3000); };
    socket.onerror=()=>{};
  }catch(e){ setWS(false); retryTimer=setTimeout(connect,3000); }
}
function handleMessage(data){
  if(data.type==='device_connected'){ setHID(true,(data.device_name||'DEVICE').toUpperCase()); logMsg('Device: '+(data.device_name||'')); }
  else if(data.type==='device_disconnected'){ setHID(false,'NO DEVICE'); }
  else if(data.type==='rc_status'){ setRC(!!data.connected); }
  else if(data.type==='cameras'){ populateCameras(data.cameras); }
  else if(data.type==='camera_active'){ updateCraneAvailability(!!data.on_crane); }
  else if(data.type==='state'&&data.controls){
    for(const id of ['pan','tilt','roll']){ const c=data.controls[id];
      if(c&&c.value!==undefined) updateBar(id,c.value); }
    if(data.osc){ if(data.osc.host)document.getElementById('cfg-ue5-host').value=data.osc.host;
      if(data.osc.port)document.getElementById('cfg-ue5-port').value=data.osc.port;
      if(data.osc.base_path)document.getElementById('cfg-base').value=data.osc.base_path; }
  }
  else if(data.type==='osc'&&data.wheel){ updateBar(data.wheel,data.value); logEntry(data.path,data.value); }
  else if(data.type==='locations'){
    updateLocations(data);                           // position panels
    if(data.camera)     liveState.camera     = data.camera;
    if(data.camera_rot) liveState.camera_rot = data.camera_rot;
    if(data.crane)      liveState.crane      = data.crane;
    refreshAllLive();                                // per-card LIVE rows
  }
}

// ── Position readout + manual override + zero (drone target = camera; base target = crane) ──
const POS_TARGETS=[
  {key:'camera', mountId:'cam-pos-panel'},
  {key:'crane',  mountId:'crane-pos-panel'}
];
// Panel title reflects what the camera is doing in the current grip mode.
function posPanelTitle(key){
  if(key==='crane') return 'Crane base (rig)';
  // key==='camera' — title follows the active grip mode
  if(currentGripMode==='drone') return 'Drone target (camera)';
  if(currentGripMode==='dolly') return 'Dolly target (camera)';
  return 'Crane target (camera)';                  // crane mode
}
const lastPos={};                // {target: {X,Y,Z}}  — most recent live reading
const posEditing={};             // {target+axis: true} — don't clobber an input the user is typing in

function renderPosPanels(){
  for(const t of POS_TARGETS){
    const mount=document.getElementById(t.mountId); if(!mount) return;
    mount.innerHTML=`<span class="ptitle" id="ptitle-${t.key}">${posPanelTitle(t.key)}</span>
      ${['X','Y','Z'].map(a=>`
        <span class="pcoord"><label>${a}</label>
          <span class="pval" id="pv-${t.key}-${a}">—</span>
          <input id="pi-${t.key}-${a}" type="number" step="1" placeholder="set"
                 onfocus="posEditing['${t.key}${a}']=true"
                 onblur="posEditing['${t.key}${a}']=false">
        </span>`).join('')}
      <button class="pbtn" onclick="sendSetLocation('${t.key}')">Set</button>
      <button class="pbtn zero" onclick="sendZeroLocation('${t.key}')">Zero</button>`;
  }
}
function refreshPosPanelTitles(){
  for(const t of POS_TARGETS){
    const el=document.getElementById('ptitle-'+t.key);
    if(el) el.textContent=posPanelTitle(t.key);
  }
}
function updateLocations(data){
  for(const t of POS_TARGETS){
    const p=data[t.key]; if(!p) continue;
    lastPos[t.key]=p;
    for(const a of ['X','Y','Z']){
      const ro=document.getElementById('pv-'+t.key+'-'+a);
      if(ro) ro.textContent=(p[a]||0).toFixed(1);
    }
  }
}
function readSetInputs(target){
  // For any axis the user left blank, fall back to the last known live reading
  const last=lastPos[target]||{X:0,Y:0,Z:0};
  const out={};
  for(const a of ['X','Y','Z']){
    const el=document.getElementById('pi-'+target+'-'+a);
    const v=el&&el.value!==''?parseFloat(el.value):last[a];
    out[a]=isNaN(v)?last[a]:v;
  }
  return out;
}
function sendSetLocation(target){
  if(!socket||socket.readyState!==WebSocket.OPEN) return;
  const p=readSetInputs(target);
  socket.send(JSON.stringify({type:'set_location',target:target,x:p.X,y:p.Y,z:p.Z}));
  // clear the input fields so they don't keep stale overrides
  for(const a of ['X','Y','Z']){ const el=document.getElementById('pi-'+target+'-'+a); if(el) el.value=''; }
  logMsg('Set '+target+' → X='+p.X.toFixed(1)+' Y='+p.Y.toFixed(1)+' Z='+p.Z.toFixed(1));
}
function sendZeroLocation(target){
  if(!socket||socket.readyState!==WebSocket.OPEN) return;
  socket.send(JSON.stringify({type:'set_location',target:target,x:0,y:0,z:0}));
  for(const a of ['X','Y','Z']){ const el=document.getElementById('pi-'+target+'-'+a); if(el) el.value=''; }
  logMsg('Zeroed '+target+' position');
}
function sendControl(wheel,param,value){
  if(socket&&socket.readyState===WebSocket.OPEN) socket.send(JSON.stringify({wheel,param,value}));
}
function pushOSCSettings(){
  sendControl('osc','host',document.getElementById('cfg-ue5-host').value.trim());
  sendControl('osc','port',+document.getElementById('cfg-ue5-port').value);
  sendControl('osc','base_path',document.getElementById('cfg-base').value.trim());
}

// ── Log ──────────────────────────────────────────────────────────────────────
let logThrottle=0;
function logEntry(path,value){ if(++logThrottle%5!==0)return;
  const c=document.getElementById('log'); const d=document.createElement('div'); d.className='log-entry';
  d.innerHTML='<span class="p">'+path+'</span><span class="v">'+value.toFixed(4)+'</span>';
  c.insertBefore(d,c.firstChild); while(c.children.length>80)c.removeChild(c.lastChild);
}
function logMsg(m){ const c=document.getElementById('log'); const d=document.createElement('div');
  d.className='log-entry'; d.style.color='var(--faint)'; d.textContent=m;
  c.insertBefore(d,c.firstChild); while(c.children.length>80)c.removeChild(c.lastChild); }

['cfg-ws-host','cfg-ws-port'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  if(socket){socket.onclose=null;socket.close();} connect(); }));
['cfg-ue5-host','cfg-ue5-port','cfg-base'].forEach(id=>document.getElementById(id).addEventListener('change',pushOSCSettings));

// ── Boot ──────────────────────────────────────────────────────────────────────
setUnits(unitSystem);                              // sets active class on units buttons + re-renders
setFocusUnits(focusUnits);                         // and the focus-only toggle
renderFunctionBindButton('autolevel');             // function bind buttons reflect their stored binding
['pan','tilt','roll'].forEach(id=>updateBar(id,0.5));
PARAMS.forEach(bindLabel);
renderPosPanels();
// (applyVelocityDefaults no longer called — Rob wants D=0 for everything by default;
//  the function is left defined in case a "safe stick drift" preset is needed later.)
rebuildLensDropdown();                              // merge any persisted custom lenses into the dropdown
// Seed each card's Min/Max labels + inputs, then refresh readouts
refreshRangeLabels();
refreshRangeInputs();
PARAMS.forEach(p=>updateBar(p, getParam(p)));       // re-render in case overrides loaded
connect();
</script>
